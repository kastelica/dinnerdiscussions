<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Member Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#fcf9f3] min-h-screen grid place-items-center p-6">
    <form method="post" class="bg-white border border-black/10 rounded-xl p-6 w-full max-w-md">
      <h1 class="text-2xl font-serif mb-2">Member Sign In</h1>
      <p class="text-sm text-black/60 mb-4">Pick a demo member profile to open the account dashboard.</p>
      <label class="text-xs uppercase tracking-widest text-[#775a0a]">Member</label>
      <select name="member_id" class="mt-2 w-full border border-black/20 rounded-md p-2" required>
        {% for member in members %}
          <option value="{{ member.id }}">{{ member.first_name }} {{ member.last_name }} ({{ member.email }})</option>
        {% endfor %}
      </select>
      <button class="mt-5 w-full bg-[#061b0e] text-white py-2.5 rounded-md">Enter Dashboard</button>
    </form>
  </body>
</html>
